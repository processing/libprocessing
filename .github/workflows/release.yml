name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-stubs:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup
      - name: Generate type stubs
        run: |
          cargo build --release -p processing_pyo3
          cargo run --release -p generate_stubs
      - uses: actions/upload-artifact@v4
        with:
          name: type-stubs
          path: crates/processing_pyo3/mewnala/*.pyi

  linux:
    runs-on: ubuntu-22.04
    needs: generate-stubs
    strategy:
      matrix:
        # TODO: add aarch64 when we are ready to address long build times
        target: [x86_64] 
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/download-artifact@v4
        with:
          name: type-stubs
          path: crates/processing_pyo3/mewnala
      - name: Setup QEMU
        if: matrix.target == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          container: "quay.io/pypa/manylinux_2_34_${{matrix.target}}:latest"
          docker-options: "-e PKG_CONFIG_PATH=/usr/lib64/pkgconfig:/usr/lib/${{matrix.target}}-linux-gnu/pkgconfig:/usr/local/lib/pkgconfig"
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          manylinux: 2_34
          before-script-linux: |
            EXTRA_PACKAGES=""
            if [ "$(uname -m)" = "aarch64" ]; then
              EXTRA_PACKAGES="gcc-aarch64-linux-gnu"
            fi

            dnf -y install cmake gcc-c++ \
                pkgconfig alsa-lib-devel systemd-devel \
                libX11-devel libXrandr-devel libXinerama-devel libXcursor-devel libXi-devel \
                libxkbcommon-devel wayland-devel wayland-protocols-devel \
                glfw-devel $EXTRA_PACKAGES
          working-directory: crates/processing_pyo3
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}
          path: crates/processing_pyo3/dist

  macos:
    runs-on: ${{ matrix.runner }}
    needs: generate-stubs
    strategy:
      matrix:
        include:
          - runner: macos-14
            target: aarch64
          # TODO: lets add this build when we have a moment
          # - runner: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/download-artifact@v4
        with:
          name: type-stubs
          path: crates/processing_pyo3/mewnala
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter
          working-directory: crates/processing_pyo3
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: crates/processing_pyo3/dist

  windows:
    runs-on: windows-latest
    needs: generate-stubs
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - uses: actions/download-artifact@v4
        with:
          name: type-stubs
          path: crates/processing_pyo3/mewnala
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist --find-interpreter
          working-directory: crates/processing_pyo3
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x64
          path: crates/processing_pyo3/dist

  sdist:
    runs-on: ubuntu-latest
    needs: generate-stubs
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/download-artifact@v4
        with:
          name: type-stubs
          path: crates/processing_pyo3/mewnala
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: crates/processing_pyo3
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/processing_pyo3/dist

  ffi-linux:
    name: FFI Linux (x86_64)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/setup
      - name: Build FFI shared library
        run: cargo build --release -p processing_ffi --features wayland,x11,webcam
      - name: Stage release files
        run: |
          mkdir -p staging/lib staging/include
          cp target/release/libprocessing.so staging/lib/
          cp target/release/libprocessing.a staging/lib/
          cp crates/processing_ffi/include/processing.h staging/include/
          cp LICENSE.md staging/
          tar -czvf libprocessing-${{ github.ref_name }}-linux-x86_64.tar.gz -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: libprocessing-linux-x86_64
          path: libprocessing-${{ github.ref_name }}-linux-x86_64.tar.gz

  ffi-macos:
    name: FFI macOS (aarch64)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Build FFI shared library
        run: cargo build --release -p processing_ffi --features webcam
      - name: Stage release files
        run: |
          mkdir -p staging/lib staging/include
          cp target/release/libprocessing.dylib staging/lib/
          cp target/release/libprocessing.a staging/lib/
          cp crates/processing_ffi/include/processing.h staging/include/
          cp LICENSE.md staging/
          tar -czvf libprocessing-${{ github.ref_name }}-macos-aarch64.tar.gz -C staging .
      - uses: actions/upload-artifact@v4
        with:
          name: libprocessing-macos-aarch64
          path: libprocessing-${{ github.ref_name }}-macos-aarch64.tar.gz

  ffi-windows:
    name: FFI Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
      - name: Build FFI shared library
        run: cargo build --release -p processing_ffi --features webcam
      - name: Stage release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging/lib, staging/include | Out-Null
          Copy-Item target/release/processing.dll staging/lib/
          Copy-Item target/release/processing.dll.lib staging/lib/
          Copy-Item target/release/processing.lib staging/lib/
          Copy-Item crates/processing_ffi/include/processing.h staging/include/
          Copy-Item LICENSE.md staging/
          Compress-Archive -Path staging/* -DestinationPath libprocessing-${{ github.ref_name }}-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: libprocessing-windows-x64
          path: libprocessing-${{ github.ref_name }}-windows-x64.zip

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, macos, windows, sdist]
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [ffi-linux, ffi-macos, ffi-windows, linux, macos, windows, sdist]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: libprocessing-*
          merge-multiple: true
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: release-assets
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
